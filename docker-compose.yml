services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: staroverlay-backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://user:password@db:5432/staroverlay
      - REDIS_URL=redis://redis:6379
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - OAUTH_ENCRYPTION_KEY=${OAUTH_ENCRYPTION_KEY}
      - INTERNAL_SECRET=${INTERNAL_SECRET}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
      - APP_WIDGET_SERVER=${APP_WIDGET_SERVER:-http://localhost:4000}
      - UPLOAD_SERVER=${UPLOAD_SERVER}
      - UPLOAD_SECRET=${UPLOAD_SECRET}
      - UPLOAD_JWT=${UPLOAD_JWT}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: staroverlay-db
    restart: always
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=staroverlay
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d staroverlay"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: staroverlay-redis
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
